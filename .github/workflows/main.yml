name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-latest]
        node-version: [22, 24]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      # The CLI init/bundle specs accumulate multiple full Next.js apps under
      # packages/vovk-cli and yarn copies that directory on every file: install,
      # which overruns the ~14 GB free on stock ubuntu runners. Drop preinstalled
      # toolchains we never use to reclaim ~25-30 GB.
      - name: Free disk space
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          package_json_file: ./test/package.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - run: pip install -r ./packages/vovk-python/requirements.txt

      - name: Setup Node.js environment
        uses: actions/setup-node@v2.1.5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix test ci

      - name: Run tests
        run: NODE_OPTIONS="--max-old-space-size=8192" npm t
